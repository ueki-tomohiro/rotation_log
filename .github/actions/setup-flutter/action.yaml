name: setup flutter
description: setup flutter with asdf
runs:
  using: "composite"
  steps:
    - name: setup java
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"
    - name: restore asdf cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.asdf
          ~/.pub-cache
          ~/Library/Caches/flutter
        key: ${{ runner.os }}-asdf-${{ hashFiles('.tool-versions') }}
        restore-keys: |
          ${{ runner.os }}-asdf-
    - name: restore pubspec cache
      uses: actions/cache@v4
      with:
        path: |
          .dart_tool
          packages/rotation_log/.dart_tool
          packages/rotation_log/example/.dart_tool
        key: ${{ runner.os }}-dart-tool-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-dart-tool-
    - name: install asdf tools
      run: |
        if [ ! -d "$HOME/.asdf" ]; then
          git clone https://github.com/asdf-vm/asdf.git "$HOME/.asdf" --branch v0.18.0
        fi
        echo "$HOME/.asdf/bin" >> "$GITHUB_PATH"
        echo "$HOME/.asdf/shims" >> "$GITHUB_PATH"
        asdf plugin add dart || true
        asdf plugin add flutter || true
        asdf install
      shell: bash
    - name: install melos command
      run: dart pub global activate melos
      shell: bash
